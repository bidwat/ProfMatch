name: professor-match
region: nyc
services:
  - name: backend
    dockerfile_path: apps/backend/Dockerfile
    source_dir: /
    github:
      repo: bidwat/ProfMatch
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
      - path: /health
    health_check:
      http_path: /health
    envs:
      - key: APP_ENV
        scope: RUN_TIME
        value: production
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_FIREBASE_SERVICE_ACCOUNT_JSON
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: https://REPLACE_WITH_FRONTEND_HOSTNAME
      - key: RATE_LIMIT_PER_MINUTE
        scope: RUN_TIME
        value: "300"
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: INFO
      - key: OPENROUTER_MODEL
        scope: RUN_TIME
        value: inclusionai/ring-2.6-1t:free
      - key: OPENROUTER_BASE_URL
        scope: RUN_TIME
        value: https://openrouter.ai/api/v1
  - name: frontend
    dockerfile_path: apps/frontend/Dockerfile
    source_dir: /
    github:
      repo: bidwat/ProfMatch
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /
    envs:
      - key: BACKEND_URL
        scope: RUN_AND_BUILD_TIME
        value: https://REPLACE_WITH_APP_HOSTNAME
# Data lives in Firebase Firestore; configure FIREBASE_SERVICE_ACCOUNT_JSON above.
