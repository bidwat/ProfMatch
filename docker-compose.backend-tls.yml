# Droplet backend with automatic HTTPS via Caddy.
# Requires DOMAIN to resolve to this droplet before starting (Let's Encrypt).
# See docs/deployment/BACKEND_TLS.md for the cutover runbook.
services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    environment:
      PORT: 8000
      APP_ENV: ${APP_ENV:-production}
    expose:
      - "8000"
    volumes:
      - profmatch_backend_jobs:/app/data/qa/onboarding
      - profmatch_backend_raw:/app/data/raw
      - profmatch_backend_processed:/app/data/processed
      - profmatch_backend_scan_results:/app/data/qa/scan_results
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  scan-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      SCAN_WORKER_CONCURRENCY: ${SCAN_WORKER_CONCURRENCY:-2}
      SCAN_WORKER_POLL_INTERVAL_SECONDS: ${SCAN_WORKER_POLL_INTERVAL_SECONDS:-5}
      SCAN_TASK_LEASE_SECONDS: ${SCAN_TASK_LEASE_SECONDS:-900}
      SCAN_TASK_HEARTBEAT_SECONDS: ${SCAN_TASK_HEARTBEAT_SECONDS:-60}
    command: ["python", "-m", "apps.backend.app.workers.scan_worker"]
    volumes:
      - profmatch_backend_jobs:/app/data/qa/onboarding
      - profmatch_backend_raw:/app/data/raw
      - profmatch_backend_processed:/app/data/processed
      - profmatch_backend_scan_results:/app/data/qa/scan_results
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN to the backend hostname, e.g. api.profmatch.example}
    command: |
      sh -c 'printf "%s {\n  encode gzip\n  reverse_proxy backend:8000\n}\n" "$$DOMAIN" > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile'
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  profmatch_backend_jobs:
  profmatch_backend_raw:
  profmatch_backend_processed:
  profmatch_backend_scan_results:
  caddy_data:
  caddy_config:
